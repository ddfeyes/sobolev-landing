<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Elliott Wave glass chart</title>
  <desc id="desc">Transparent glass panel with candlesticks and smooth wave lines.</desc>
  <defs>
    <linearGradient id="pane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c7f4ff" stop-opacity=".23"/>
      <stop offset=".48" stop-color="#29445d" stop-opacity=".36"/>
      <stop offset="1" stop-color="#061420" stop-opacity=".22"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".92"/>
      <stop offset=".2" stop-color="#95d7ff" stop-opacity=".72"/>
      <stop offset=".55" stop-color="#1f80c7" stop-opacity=".36"/>
      <stop offset=".78" stop-color="#ffffff" stop-opacity=".88"/>
      <stop offset="1" stop-color="#66c7ff" stop-opacity=".68"/>
    </linearGradient>
    <linearGradient id="innerEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".48"/>
      <stop offset=".5" stop-color="#75caf6" stop-opacity=".16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".34"/>
    </linearGradient>
    <linearGradient id="blueWave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#48c8ff" stop-opacity=".42"/>
      <stop offset=".5" stop-color="#7de3ff" stop-opacity=".92"/>
      <stop offset="1" stop-color="#1fa0ff" stop-opacity=".46"/>
    </linearGradient>
    <linearGradient id="blueRibbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2fb7ff" stop-opacity=".18"/>
      <stop offset=".52" stop-color="#77e0ff" stop-opacity=".42"/>
      <stop offset="1" stop-color="#1f86ff" stop-opacity=".14"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f2d281" stop-opacity=".54"/>
      <stop offset=".52" stop-color="#fff2b8" stop-opacity=".95"/>
      <stop offset="1" stop-color="#e8b76e" stop-opacity=".62"/>
    </linearGradient>
    <filter id="softGlow" x="-10%" y="-18%" width="120%" height="136%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="edgeGlow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#7bd3ff" flood-opacity=".42"/>
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".42"/>
    </filter>
    <clipPath id="panelClip">
      <rect x="106" y="102" width="988" height="616" rx="78"/>
    </clipPath>
  </defs>

  <ellipse cx="600" cy="718" rx="438" ry="34" fill="#43b8ff" opacity=".16"/>
  <g filter="url(#edgeGlow)">
    <rect x="106" y="102" width="988" height="616" rx="78" fill="url(#pane)"/>
    <rect x="106" y="102" width="988" height="616" rx="78" fill="none" stroke="url(#edge)" stroke-width="13"/>
    <rect x="126" y="122" width="948" height="576" rx="62" fill="none" stroke="url(#innerEdge)" stroke-width="4"/>
    <rect x="148" y="143" width="904" height="534" rx="50" fill="none" stroke="#d7f4ff" stroke-opacity=".18" stroke-width="2"/>
  </g>

  <g clip-path="url(#panelClip)">
    <path d="M90 522 C220 463 319 524 435 474 C543 427 624 353 736 382 C832 408 906 492 1110 410"
          fill="none" stroke="url(#blueRibbon)" stroke-width="64" stroke-linecap="round" opacity=".78"/>
    <path d="M80 525 C225 453 324 526 438 471 C544 429 630 352 740 381 C841 409 918 496 1120 407"
          fill="none" stroke="url(#blueWave)" stroke-width="12" stroke-linecap="round" filter="url(#softGlow)"/>
    <path d="M83 554 C228 559 342 578 470 545 C615 507 684 353 812 323 C927 297 1008 355 1138 337"
          fill="none" stroke="url(#goldLine)" stroke-width="9" stroke-linecap="round" filter="url(#softGlow)"/>
    <path d="M96 461 C230 492 352 467 492 452 C628 437 742 443 884 398 C982 367 1056 379 1122 395"
          fill="none" stroke="#55ccff" stroke-opacity=".45" stroke-width="3"/>
    <path d="M96 574 C236 589 384 604 516 579 C666 550 747 506 890 508 C982 510 1048 541 1128 526"
          fill="none" stroke="#55ccff" stroke-opacity=".34" stroke-width="3"/>

    <g fill="#69cdf8" stroke="#93e3ff" stroke-width="5" stroke-linecap="round">
      <line x1="172" y1="538" x2="172" y2="674"/>
      <rect x="144" y="584" width="56" height="72" rx="3"/>
      <line x1="232" y1="500" x2="232" y2="641"/>
      <rect x="204" y="548" width="56" height="66" rx="3"/>
      <line x1="319" y1="416" x2="319" y2="558"/>
      <rect x="291" y="462" width="56" height="70" rx="3"/>
      <line x1="430" y1="554" x2="430" y2="696"/>
      <rect x="402" y="596" width="56" height="68" rx="3"/>
      <line x1="520" y1="451" x2="520" y2="623"/>
      <rect x="492" y="510" width="56" height="80" rx="3"/>
      <line x1="636" y1="364" x2="636" y2="523"/>
      <rect x="608" y="421" width="56" height="84" rx="3"/>
      <line x1="704" y1="298" x2="704" y2="456"/>
      <rect x="676" y="356" width="56" height="94" rx="3"/>
      <line x1="776" y1="233" x2="776" y2="394"/>
      <rect x="748" y="297" width="56" height="100" rx="3"/>
      <line x1="1071" y1="382" x2="1071" y2="544"/>
      <rect x="1043" y="436" width="56" height="88" rx="3"/>
    </g>

    <g fill="#f6dda0" stroke="#ffe8ad" stroke-width="5" stroke-linecap="round">
      <line x1="259" y1="500" x2="259" y2="653"/>
      <rect x="231" y="542" width="56" height="78" rx="3"/>
      <line x1="379" y1="483" x2="379" y2="641"/>
      <rect x="351" y="536" width="56" height="66" rx="3"/>
      <line x1="462" y1="588" x2="462" y2="745"/>
      <rect x="434" y="626" width="56" height="82" rx="3"/>
      <line x1="575" y1="429" x2="575" y2="589"/>
      <rect x="547" y="486" width="56" height="72" rx="3"/>
      <line x1="843" y1="279" x2="843" y2="433"/>
      <rect x="815" y="328" width="56" height="82" rx="3"/>
      <line x1="905" y1="313" x2="905" y2="465"/>
      <rect x="877" y="364" width="56" height="76" rx="3"/>
      <line x1="965" y1="383" x2="965" y2="535"/>
      <rect x="937" y="426" width="56" height="72" rx="3"/>
      <line x1="1024" y1="418" x2="1024" y2="574"/>
      <rect x="996" y="469" width="56" height="82" rx="3"/>
    </g>
  </g>

  <g opacity=".7">
    <path d="M139 155 C154 129 181 119 214 121" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity=".55"/>
    <path d="M970 120 C1022 121 1054 148 1067 188" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity=".36"/>
    <path d="M131 650 C173 693 242 696 321 692" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity=".28"/>
    <path d="M190 122 H940" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity=".22"/>
    <path d="M185 700 H1014" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".25"/>
  </g>
</svg>
